name: FVP Test
on:
  push:
    branches:
      - ci-test
  workflow_dispatch:
    inputs:
      fvp-build:
        type: boolean
        default: true
      fvp-test:
        type: boolean
        default: true

jobs:
  fvp-build:
    name: Build FVP packages
    runs-on: ubuntu-22.04
    #if: ${{ inputs.fvp-build }}
    defaults:
      run:
        working-directory: /mnt
    steps:
      - name: Set permission for /mnt
        run: sudo chmod 777 /mnt

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.0.0

      - name: Login to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bash ${GITHUB_WORKSPACE}/tests/integration/fvp/gha-run.sh install-dependencies

      - name: Build FVP packages
        run: bash ${GITHUB_WORKSPACE}/tests/integration/fvp/gha-run.sh build-packages

      - name: Push to ghcr.io
        run: |
          tar Jcvf fvp-package.tar.xz package
          oras push ghcr.io/${GITHUB_REPOSITORY_OWNER}/fvp-package:latest fvp-package.tar.xz

  fvp-test:
    name: Simple test on FVP
    runs-on: ubuntu-22.04
    needs: fvp-build
    # allow skipping fvp-build
    #if: ${{ inputs.fvp-test }} && ${{ !failure() && !cancelled() }}
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.0.0

      - name: Login to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull from ghcr.io
        run: |
          oras pull ghcr.io/${GITHUB_REPOSITORY_OWNER}/fvp-package:latest
          tar Jxvf fvp-package.tar.xz

      - name: Install dependencies
        run: bash tests/integration/fvp/gha-run.sh install-dependencies

      - name: Download kata-containers
        run: |
          GH_ARTIFACTS_URL=${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/artifacts
          i=0
          while true; do
            c=$(curl -sL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              ${GH_ARTIFACTS_URL}?page=$i | jq '[.artifacts[] | select(.name=="kata-static-tarball-arm64" and .workflow_run.head_branch=="main")] | length')
            if [[ $c > 0 ]]; then
              l=$(curl -sL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                ${GH_ARTIFACTS_URL}?page=$i | jq -r '[.artifacts[] | select(.name=="kata-static-tarball-arm64" and .workflow_run.head_branch=="main")][0].archive_download_url')
              curl -L \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -o kata-static.tar.xz $l
              break
            fi
            i=$(($i+1))
            sleep 1
          done

      - name: Prepare rootfs
        run: bash tests/integration/fvp/gha-run.sh prepare-rootfs

      - name: Run simple test
        run: bash tests/integration/fvp/gha-run.sh run
